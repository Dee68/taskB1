<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Service Survey Form</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f6f8;
    margin: 0;
    padding: 20px;
    display: flex;
    justify-content: center;
  }

  .container {
    background: #ffffff;
    width: 100%;
    max-width: 800px;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
  }

  .header {
    display: flex;
    align-items: center;
    background-color: hsl(78, 71%, 64%);
    padding: 15px;
    border-radius: 8px 8px 0 0;
  }

  .header img {
    height: 50px;
    margin-right: 15px;
  }
  .header-text p {
    margin: 5px 0 0;
    color: #6b7077;
    font-size: 14px;
    line-height: 1.4;
  }
  .header-text {
  flex: 1;
  text-align: center;
  }
  .header h1 {
    margin: 0;
    color: #252627;
    font-size: 28px;
  }

  label {
    font-weight: bold;
    margin-top: 15px;
    display: block;
  }

  input, select, textarea {
    width: 100%;
    max-width: 100%;
    padding: 8px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 14px;
  }

  input:focus, select:focus, textarea:focus {
    border-color: #a3ed99;
    outline: none;
    box-shadow: 0 0 5px rgba(87, 139, 115, 0.3);
  }

  /* .radio-group {
    margin-bottom: 15px;
  }

  .radio-group input {
    margin-right: 8px;
  }

  .radio-group label {
    font-weight: normal;
    display: inline;
  }
  */
  .radio-group {
  display: flex;             /* flex container for horizontal layout */
  justify-content: space-between; /* even spacing across the row */
  margin-bottom: 15px;
  flex-wrap: wrap;           /* wrap to next line if the screen is too narrow */
  }

  .radio-group label {
    display: flex;             /* align radio button and text horizontally */
    align-items: center;       /* vertical alignment */
    font-weight: normal;
    cursor: pointer;
  }

  .radio-group input[type="radio"] {
    margin-right: 5px;         /* space between radio button and text */
  }

  button {
    background-color: #a3ed99;
    color: white;
    padding: 12px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 16px;
    width: 100%;
  }

  button:hover {
    background-color: #a3ed99;
  }
  .question {
  margin-bottom: 20px;
}

.question label {
  display: flex;        /* Use flex to align radio and text */
  align-items: center;  /* Vertically center the text with the radio */
  margin-bottom: 5px;   /* Spacing between options */
  cursor: pointer;      /* Makes clicking the text select the radio */
}

.question input[type="radio"] {
  margin-right: 10px;   /* Space between radio button and text */
}
  #result {
    margin-top: 20px;
    padding: 15px;
    background: #e9f5ff;
    border-left: 5px solid #a3ed99;
    font-weight: bold;
  }

  @media print {
    body {
      background: white;
    }
    .container {
      box-shadow: none;
      border: 1px solid #000;
    }
  }
</style>
</head>
<body>
<div class="container">


<!-- Header with logo -->
<div class="header">
  <img src="logo.png" alt="Company Logo">
  <div class="header-text">
  <h1>Customer Service Survey Form</h1>
  <p>Please take a moment to give us your feedback about your recent experience with our services.</p>
  </div>
</div>

<form>

  <label for="customerName">Customer Name:</label>
<input type="text" id="customerName" name="customerName" required>

<label for="agentName">Service Representative:</label>
<input type="text" id="agentName" name="agentName" required>

  <!-- Date of Service -->
  <label for="serviceDate">Date of Service:</label>
  <input type="date" id="serviceDate" name="serviceDate" required>

  <!-- Q1 -->
  <label for="requestMethod">1. How did you request the service?</label>
  <select id="requestMethod" name="requestMethod" required>
    <option value="">--Select--</option>
    <option value="phone">Phone</option>
    <option value="email">Email</option>
    <option value="website">Website</option>
    <option value="other">Other</option>
  </select>

  <!-- Q2 -->
  <label>2. How easy was it to arrange your service?</label>
  <div class="radio-group">
    <label><input type="radio" name="ease" value=5 required> Very Easy</label>
    <label><input type="radio" name="ease" value=4> Easy</label>
    <label><input type="radio" name="ease" value=3> Neutral</label>
    <label><input type="radio" name="ease" value=2> Difficult</label>
    <label><input type="radio" name="ease" value=1> Very Difficult</label>
  </div>

  <!-- Q3 -->
  <label>3. Was the appointment scheduled at a convenient time?</label>
  <div class="radio-group">
    <label><input type="radio" name="convenient" value=5 required> Yes</label>
    <label><input type="radio" name="convenient" value=1> No</label>
  </div>

  <!-- Q4 -->
  <label>4. Did the technical courier arrive on time?</label>
  <div class="radio-group">
    <label><input type="radio" name="onTime" value=5 required> Yes</label>
    <label><input type="radio" name="onTime" value=1> No</label>
  </div>

  <!-- Q5 -->
  <label>5. If late, how long was the delay?</label>
  <select name="delayTime">
    <option value="">--Select--</option>
    <option value="0-15">0–15 mins</option>
    <option value="15-30">15–30 mins</option>
    <option value="30+">30+ mins</option>
  </select>

  <!-- Q6 -->
  <label>6. How would you rate the professionalism of the courier?</label>
  <div class="radio-group">
    <label><input type="radio" name="professionalism" value=5 required> Excellent</label>
    <label><input type="radio" name="professionalism" value=4> Good</label>
    <label><input type="radio" name="professionalism" value=3> Average</label>
    <label><input type="radio" name="professionalism" value=2> Poor</label>
    <label><input type="radio" name="professionalism" value=1> Very Poor</label>
  </div>

  <!-- Q7 -->
  <label>7. Was the installation completed successfully?</label>
  <div class="radio-group">
    <label><input type="radio" name="installation" value=5 required> Yes</label>
    <label><input type="radio" name="installation" value=1> No</label>
    <label><input type="radio" name="installation" value=3> Partially</label>
  </div>

  <!-- Q8 -->
  <label>8. How clearly did the courier explain the installation?</label>
  <div class="radio-group">
    <label><input type="radio" name="clarity" value=5 required> Very Clearly</label>
    <label><input type="radio" name="clarity" value=4> Clearly</label>
    <label><input type="radio" name="clarity" value=3> Neutral</label>
    <label><input type="radio" name="clarity" value=2> Unclear</label>
    <label><input type="radio" name="clarity" value=1> Very Unclear</label>
  </div>

  <!-- Q9 -->
  <label>9. Did you experience any issues after installation?</label>
  <div class="radio-group">
    <label><input type="radio" name="issues" value=5 required> Yes</label>
    <label><input type="radio" name="issues" value=1> No</label>
  </div>
  <label>If yes, please describe:</label>
  <textarea name="issuesDescription"></textarea>

  <!-- Q10 -->
  <label>10. Overall, how satisfied are you with the service?</label>
  <div class="radio-group">
    <label><input type="radio" name="overall" value=5 required> Very Satisfied</label>
    <label><input type="radio" name="overall" value=4> Satisfied</label>
    <label><input type="radio" name="overall" value=3> Neutral</label>
    <label><input type="radio" name="overall" value=2> Dissatisfied</label>
    <label><input type="radio" name="overall" value=1> Very Dissatisfied</label>
  </div>
  <div id="result" style="margin-top:20px; font-weight:bold;"></div>

  <button type="button" onclick="calculateScore()">Submit</button>
  <button type="button" id="downloadBtn" style="margin-top:10px; display:none;">Download Result as CSV</button>

</form>
</div>
<script>
function calculateScore() {
  let total = 0;
  let count = 0;
   //Get names
  let customerName = document.getElementById("customerName").value;
  let agentName = document.getElementById("agentName").value;

  if (!customerName || !agentName) {
    alert("Please enter both Customer Name and Service Representative.");
    return;
  }

 

  // Function to get selected value
  function getValue(name) {
    let options = document.getElementsByName(name);
    for (let i = 0; i < options.length; i++) {
      if (options[i].checked) {
        return parseInt(options[i].value);
      }
    }
    return null;
  }

  // Questions to score
  let questions = ["ease", "convenient", "onTime", "professionalism", "installation", "clarity", "issues", "overall"];

  questions.forEach(q => {
    let val = getValue(q);
    if (val !== null) {
      total += val;
      count++;
    }
  });

  let average = count > 0 ? (total / count).toFixed(2) : 0;
   //Determine rating label
  let rating = "";
  if (average >= 4.5) rating = "Excellent";
  else if (average >= 3.5) rating = "Good";
  else if (average >= 2.5) rating = "Average";
  else if (average >= 1.5) rating = "Poor";
  else rating = "Very Poor";
  let resultDiv = document.getElementById("result");

  resultDiv.innerHTML =
    "<strong>Customer:</strong> " + customerName + "<br>" +
    "<strong>Service Representative:</strong> " + agentName + "<br><br>" +
    customerName + "'s average rating for the service is: <strong>" + average + "</strong> (" + rating + ")<br>" +
    "Total Score: " + total;

  // Display result
resultDiv.style.display = "block";

// Prepare CSV content
  let csvContent = "data:text/csv;charset=utf-8,";
  csvContent += "Customer,Agent,Total,Average,Rating\n";
  csvContent += `${customerName},${agentName},${total},${average},${rating}\n`;

  // Enable download button
  let downloadBtn = document.getElementById("downloadBtn");
  downloadBtn.style.display = "inline-block";
  downloadBtn.onclick = function() {
    let encodedUri = encodeURI(csvContent);
    let link = document.createElement("a");
    link.setAttribute("href", encodedUri);
    link.setAttribute("download", "survey_result.csv");
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };
 }
</script>
</body>
</html>
