<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Customer Service Survey Form</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20mm;
    max-width: 800px;
  }

  /* Header styling */
  .header {
    display: flex;
    align-items: center;
    border-bottom: 2px solid #000;
    padding-bottom: 10px;
    margin-bottom: 20px;
  }
  .header img {
    height: 60px;
    margin-right: 15px;
  }
  .header h1 {
    margin: 0;
    font-size: 22px;
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 15px;
  }
  input, select, textarea {
    margin-top: 5px;
    margin-bottom: 15px;
    width: 100%;
    max-width: 500px;
    padding: 5px;
  }
  .radio-group {
    margin-top: 5px;
    margin-bottom: 15px;
  }
  .radio-group input {
    width: auto;
    margin-right: 5px;
  }
  textarea {
    height: 60px;
  }
  @media print {
    body {
      width: 210mm;
      height: 297mm;
      margin: 20mm;
    }
    input, select, textarea {
      width: 100%;
    }
  }
</style>
</head>
<body>

<!-- Header with logo -->
<div class="header">
  <img src="logo.png" alt="Company Logo">
  <h1>Customer Service Survey Form</h1>
</div>

<form>

  <!-- Date of Service -->
  <label for="serviceDate">Date of Service:</label>
  <input type="date" id="serviceDate" name="serviceDate" required>

  <!-- Q1 -->
  <label for="requestMethod">1. How did you request the service?</label>
  <select id="requestMethod" name="requestMethod" required>
    <option value="">--Select--</option>
    <option value="phone">Phone</option>
    <option value="email">Email</option>
    <option value="website">Website</option>
    <option value="other">Other</option>
  </select>

  <!-- Q2 -->
  <label>2. How easy was it to arrange your service?</label>
  <div class="radio-group">
    <input type="radio" name="ease" value=5 required> Very Easy<br>
    <input type="radio" name="ease" value=4> Easy<br>
    <input type="radio" name="ease" value=3> Neutral<br>
    <input type="radio" name="ease" value=2> Difficult<br>
    <input type="radio" name="ease" value=1> Very Difficult
  </div>

  <!-- Q3 -->
  <label>3. Was the appointment scheduled at a convenient time?</label>
  <div class="radio-group">
    <input type="radio" name="convenient" value=5 required> Yes<br>
    <input type="radio" name="convenient" value=1> No
  </div>

  <!-- Q4 -->
  <label>4. Did the technical courier arrive on time?</label>
  <div class="radio-group">
    <input type="radio" name="onTime" value=5 required> Yes<br>
    <input type="radio" name="onTime" value=1> No
  </div>

  <!-- Q5 -->
  <label>5. If late, how long was the delay?</label>
  <select name="delayTime">
    <option value="">--Select--</option>
    <option value="0-15">0–15 mins</option>
    <option value="15-30">15–30 mins</option>
    <option value="30+">30+ mins</option>
  </select>

  <!-- Q6 -->
  <label>6. How would you rate the professionalism of the courier?</label>
  <div class="radio-group">
    <input type="radio" name="professionalism" value=5 required> Excellent<br>
    <input type="radio" name="professionalism" value=4> Good<br>
    <input type="radio" name="professionalism" value=3> Average<br>
    <input type="radio" name="professionalism" value=2> Poor<br>
    <input type="radio" name="professionalism" value=1> Very Poor
  </div>

  <!-- Q7 -->
  <label>7. Was the installation completed successfully?</label>
  <div class="radio-group">
    <input type="radio" name="installation" value=5 required> Yes<br>
    <input type="radio" name="installation" value=1> No<br>
    <input type="radio" name="installation" value=3> Partially
  </div>

  <!-- Q8 -->
  <label>8. How clearly did the courier explain the installation?</label>
  <div class="radio-group">
    <input type="radio" name="clarity" value=5 required> Very Clearly<br>
    <input type="radio" name="clarity" value=4> Clearly<br>
    <input type="radio" name="clarity" value=3> Neutral<br>
    <input type="radio" name="clarity" value=2> Unclear<br>
    <input type="radio" name="clarity" value=1> Very Unclear
  </div>

  <!-- Q9 -->
  <label>9. Did you experience any issues after installation?</label>
  <div class="radio-group">
    <input type="radio" name="issues" value=5 required> Yes<br>
    <input type="radio" name="issues" value=1> No
  </div>
  <label>If yes, please describe:</label>
  <textarea name="issuesDescription"></textarea>

  <!-- Q10 -->
  <label>10. Overall, how satisfied are you with the service?</label>
  <div class="radio-group">
    <input type="radio" name="overall" value=5 required> Very Satisfied<br>
    <input type="radio" name="overall" value=4> Satisfied<br>
    <input type="radio" name="overall" value=3> Neutral<br>
    <input type="radio" name="overall" value=2> Dissatisfied<br>
    <input type="radio" name="overall" value=1> Very Dissatisfied
  </div>
  <div id="result" style="margin-top:20px; font-weight:bold;"></div>

  <input type="submit" onclick="calculateScore()" value="Submit">

</form>
<script>
function calculateScore() {
  let total = 0;
  let count = 0;

  // Function to get selected value
  function getValue(name) {
    let options = document.getElementsByName(name);
    for (let i = 0; i < options.length; i++) {
      if (options[i].checked) {
        return parseInt(options[i].value);
      }
    }
    return null;
  }

  // Questions to score
  let questions = ["ease", "convenient", "onTime", "professionalism", "installation", "clarity", "issues", "overall"];

  questions.forEach(q => {
    let val = getValue(q);
    if (val !== null) {
      total += val;
      count++;
    }
  });

  let average = count > 0 ? (total / count).toFixed(2) : 0;

  // Display result
  document.getElementById("result").innerHTML =
    "Total Score: " + total + "<br>Average Score: " + average;
}
</script>
</body>
</html>
